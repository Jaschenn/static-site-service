# ─── static.jaschen.life ────────────────────────────────────────────────
# 新服务：proxy 到 Docker static-site-app (:8090)
server {
    server_name static.jaschen.life;

    # 请求体大小限制
    client_max_body_size 5m;

    # ─── ACME (public) ───────────────────────────────────────────────────
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /var/www/static;
    }

    # ─── 新 API 和 Web UI → Docker ───────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
    }

    location /verify {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /login {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dashboard {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /logout {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
    }

    location /delete/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /404 {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
    }

    location /cli {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
    }

    # ─── 首页 ────────────────────────────────────────────────────────────
    location = / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 短链（8位字母数字）→ Docker ────────────────────────────────────
    location ~ "^/[a-zA-Z0-9]{8}$" {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 旧的 /u/ 用户目录（保留兼容） ──────────────────────────────────
    location ~ ^/u/([^/]+)/protected/(.*)$ {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.shared-passwd;
        root /var/www/static/u;
        rewrite ^/u/([^/]+)/protected/(.*)$ /$1/protected/$2 break;
        try_files $uri =404;
        add_header Cache-Control "public, no-transform";
        add_header Access-Control-Allow-Origin "*";
        add_header X-Frame-Options "SAMEORIGIN";
    }

    location ~ ^/u/([^/]+)/reports/(.*)$ {
        root /var/www/static/u;
        rewrite ^/u/([^/]+)/reports/(.*)$ /$1/reports/$2 break;
        try_files $uri =404;
        add_header Cache-Control "public, no-transform";
        add_header Access-Control-Allow-Origin "*";
        add_header X-Frame-Options "SAMEORIGIN";
    }

    location ~ ^/u/([^/]+)/files/(.*)$ {
        root /var/www/static/u;
        rewrite ^/u/([^/]+)/files/(.*)$ /$1/files/$2 break;
        try_files $uri =404;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header X-Frame-Options "SAMEORIGIN";
    }

    location ~ ^/u/([^/]+)/$ {
        root /var/www/static;
        try_files /u/$1/index.html =404;
    }

    location ~ ^/u/([^/]+)$ {
        return 301 https://$host/u/$1/;
    }

    # ─── 未匹配路由 → 404 ────────────────────────────────────────────
    location / {
        return 404;
    }

    # ─── Security ───────────────────────────────────────────────────────
    location ~ /\. { deny all; }

    # ─── Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ─── SSL ───────────────────────────────────────────────────────────
    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate /etc/letsencrypt/live/static.jaschen.life/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/static.jaschen.life/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP → HTTPS
server {
    server_name static.jaschen.life;
    listen 80;
    listen [::]:80;
    location ^~ /.well-known/acme-challenge/ { allow all; root /var/www/static; }
    location / { return 301 https://$host$request_uri; }
}
